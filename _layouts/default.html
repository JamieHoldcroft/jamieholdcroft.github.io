<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }}{% unless page.title contains "Jamie Holdcroft" %} — Jamie Holdcroft{% endunless %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="canonical" href="{{ page.url | absolute_url }}" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="{{ page.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta name="twitter:card" content="summary" />

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}" />

  {% if page.url == "/" %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Jamie Holdcroft",
    "url": "{{ site.url }}/",
    "jobTitle": "Undergraduate Researcher",
    "affiliation": {
      "@type": "CollegeOrUniversity",
      "name": "UNSW Sydney"
    },
    "sameAs": [
      "https://github.com/JamieHoldcroft"
    ]
  }
  </script>
  {% endif %}
</head>
<body class="{% if page.light_page %}light-page{% endif %}">
  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  {% if page.gallery %}
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <img src="" alt="" />
  </div>
  {% endif %}

  <script src="{{ '/js/main.js' | relative_url }}"></script>
</body>
</html>
