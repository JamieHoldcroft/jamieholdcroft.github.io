backend:
  name: github
  repo: JamieHoldcroft/jamieholdcroft.github.io
  branch: main
  # TODO: replace with your deployed Cloudflare Worker URL once set up
  # (see the OAuth setup steps) — e.g. https://your-worker.your-subdomain.workers.dev
  base_url: https://REPLACE-WITH-YOUR-OAUTH-WORKER-URL

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "essays"
    label: "Essays"
    folder: "_essays"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short one or two sentence teaser shown on the Writing page." }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "poems"
    label: "Poems"
    folder: "_poems"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short excerpt / opening line shown on the Writing page." }
      - { label: "Poem Text", name: "poem_text", widget: "text", hint: "Line breaks are preserved exactly as typed." }

  - name: "photography"
    label: "Photography"
    files:
      - name: "gallery"
        label: "Gallery"
        file: "_data/photography.yml"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string", required: false }
              - { label: "Orientation", name: "orientation", widget: "select", options: ["portrait", "landscape", "square"], default: "landscape" }

  - name: "cv"
    label: "CV"
    files:
      - name: "cv_file"
        label: "CV File"
        file: "_data/cv.yml"
        fields:
          - { label: "CV PDF", name: "pdf", widget: "file", media_library: { config: { multiple: false } } }
